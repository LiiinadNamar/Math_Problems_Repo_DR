site_name: Math Problems Solutions
site_url: https://liiiinadnamar.github.io/Math_Problems_Repo_DR/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Home: 'index.md'
  - Lecture:
      Probabilistic Methods:
        - Probabilistic Methods:
            - Basic:
                - '1. Events & Probability': 'docs/en/4_Metody_probabilistyczne/basic/01_events_and_probability.md'
                - '2. Probability Distributions': 'docs/en/4_Metody_probabilistyczne/basic/02_probability_distributions.md'
            - Solutions Basic:
                - '1. Events & Probability Sol': 'docs/en/4_Metody_probabilistyczne/basic/solution_01_events_and_probability/sol_prob_01.md'
            - Advanced:
                - '1. Events & Probability': 'docs/en/4_Metody_probabilistyczne/advanced/01_events_and_probability.md'
                - '2. Random Variables': 'docs/en/4_Metody_probabilistyczne/advanced/02_random_variables.md'
                - '3. Distribution Parameters': 'docs/en/4_Metody_probabilistyczne/advanced/03_distribution_parameters.md'
                - '4. Selected Distributions': 'docs/en/4_Metody_probabilistyczne/advanced/04_selected_distributions.md'
                - '5. Limit Theorems': 'docs/en/4_Metody_probabilistyczne/advanced/05_limit_theorems.md'
                - '6. Basic Statistics': 'docs/en/4_Metody_probabilistyczne/advanced/06_basic_statistics.md'
                - '7. Estimation': 'docs/en/4_Metody_probabilistyczne/advanced/07_estimation.md'
                - '8. Hypothesis Testing': 'docs/en/4_Metody_probabilistyczne/advanced/08_hypothesis_testing.md'
                - '9. Correlation & Regression': 'docs/en/4_Metody_probabilistyczne/advanced/09_correlation_and_regression.md'
                - '10. Advanced Methods': 'docs/en/4_Metody_probabilistyczne/advanced/10_advanced_methods.md'
                - '11. Decision Theory': 'docs/en/4_Metody_probabilistyczne/advanced/11_decision_theory.md'
            - Solutions Advanced: []
        - Animations:
            - 'Lab 1': 'docs/en/anim/4_Metody_probalistyczne/laboratory_1.html'
            - 'Lab 2': 'docs/en/anim/4_Metody_probalistyczne/laboratory_2.html'
            - 'Lab 3': 'docs/en/anim/4_Metody_probalistyczne/laboratory_3.html'
